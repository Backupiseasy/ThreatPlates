# Packages and publishes a beta build to CurseForge, Wago, and GitHub - but not
# WoWInterface (WOWI_API_TOKEN intentionally not forwarded for beta).
# Triggers on any tag containing "-beta" (e.g. "13.0.24-beta1").
#
# Actual packaging logic lives in the reusable workflow _package_release.yml - this file
# only owns the release-channel-specific trigger, naming, and which secrets are forwarded.
name: Package and release alpha and beta version

on:
  push:
    tags:
      - "**-beta**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Beta tag to package and release (e.g. 13.0.24-beta1)"
        required: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_package_release.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
    secrets:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
      # WOWI_API_TOKEN intentionally not passed - beta is not published to WoWInterface.
