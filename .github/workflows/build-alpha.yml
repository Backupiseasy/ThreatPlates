# Packages and publishes an alpha build to GitHub only - no CurseForge/WoWInterface/Wago
# upload, since alpha is for early testing rather than wide distribution.
# Triggers on any tag containing "-alpha" (e.g. "13.0.24-alpha1").
name: Package and release alpha version

on:
  push:
    tags:
      - "**-alpha**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Alpha tag to package and release (e.g. 13.0.24-alpha1)"
        required: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      #CF_API_KEY: ${{ secrets.CF_API_KEY }}
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
      #WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
      #WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}

    steps:
      # First, clone the addon repository
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Verify changelog placeholder exists
        run: |
          grep -q '@build-time@' CHANGELOG.md || { echo "::error file=CHANGELOG.md::Missing @build-time@ placeholder"; exit 1; }
          grep -q '@build-time@' TidyPlates_ThreatPlates_Changes.log || { echo "::error file=TidyPlates_ThreatPlates_Changes.log::Missing @build-time@ placeholder"; exit 1; }

      - name: Update Build Date in release changelog
        run: |
          sed -i "s/@build-time@/$(date +%Y-%m-%d)/" CHANGELOG.md
          sed -i "s/@build-time@/$(date +%Y-%m-%d)/" TidyPlates_ThreatPlates_Changes.log

      - name: Create Mainline Package
        uses: BigWigsMods/packager@v2
        with:
          args: -e -l -n "ThreatPlates-{project-version}{classic}" -g retail

      - name: Create Vanilla Package
        uses: BigWigsMods/packager@v2
        with:
          args: -e -l -n "ThreatPlates-{project-version}{classic}" -g classic

      - name: Create TBC Classic Package
        uses: BigWigsMods/packager@v2
        with:
          args: -e -l -n "ThreatPlates-{project-version}{classic}" -g bcc

      # - name: Create Wrath Classic Package
      #   uses: BigWigsMods/packager@v2
      #   with:
      #     args: -e -l -n "ThreatPlates-{project-version}{classic}" -g wrath

      # - name: Create Cata Classic Package
      #   uses: BigWigsMods/packager@v2
      #   with:
      #     args: -e -l -n "ThreatPlates-{project-version}{classic}" -g cata

      - name: Create Mists Classic Package
        uses: BigWigsMods/packager@v2
        with:
          args: -e -l -n "ThreatPlates-{project-version}{classic}" -g mists

